<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Design</title>

    <style>
      div{
        border: 2px solid rgb(191, 190, 190);
        width: 400px;
        height: 600px;
        margin: 100px auto;
        border-radius: 15px;
        background-color: white;
      }
      .ht{
        margin: 10px ;
        border-radius: 1px;
      }
      .box{
        display: inline-block;
        width: 60px;
        height: 19px;
        margin: 15px ;
        border: 2px solid rgb(234, 234, 234);
        color: rgb(108, 108, 108);
        font-size: 19px;
        padding: 2px;
      }
      .box2{
        width: 50px;
        height: 19px;
        margin: 0px;
      }
      .mar{
        margin: 15px;
      }
      .qes{
        margin: 15px;
        color: rgb(108, 108, 108);
      }
      .read{
         text-align: center;
         
        
        
        
        
      }
      .read span{
       
        border: 2px solid rgb(209, 222, 245);
       
        
        color: rgb(8, 145, 244);
        border-radius: 80px;
        padding: 9px 35px;

      }
      
    </style>
    <link rel="stylesheet" href="stylea.css">
</head>
<body>

    <div class="imga">
        <img class="ht" src="Screenshot 2026-02-05 182401.png" width="380px" height="280px"  >

        <div class="box">
            &nbsp;Nature
        </div>

        <div class="box box2">
            &nbsp;Lake
        </div>

        <h2 class="mar">Lago di Braies</h2>
        <p class="qes">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Libero, corporis! Fugiat dicta facilis dignissimos, a aut repellendus quod.
        </p>
        <br>
        <p class="read">
            <span > Read More
        </span>
        </p>
        

    </div>
    
</body>
</html>
