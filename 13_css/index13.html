<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS positioning</title>
    <style>
        .box{
            border: 2px solid black;
            width: 70vw;
            height: 20vh;
            margin: 10px auto;
            border-radius: 23px;
            box-shadow: 5px 5px 15px rgb(100, 208, 120);
        }
        .box1{
            background-color: rgb(227, 174, 67);
            
        }
         .box2{
            background-color: rgb(48, 139, 218);
            position: absolute;
            top: 10px;
            /* iski margin 10 hai so iski parent ke respect se position 20 hogi total */
            /* parent ki posn static nahi honi chahiye  */

        }

         .box3{
            background-color: rgb(220, 96, 231);
            position: fixed;
            bottom: 0px;
            margin: 10px 150px ;
            /* element fixed rehta hai woh scroll bhi naahi hota hainot  wrt parent  */
            

        }

         .box4{
            background-color: rgb(100, 81, 241);
        }

        .parent{
         border: 3px solid black; 
         margin: 30px auto;
         width: 90vw;
         height: 110vh;  
         position: absolute; 
         
        }


    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
    </div>
    
</body>
</html>
