<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .container{
               border: 2px solid black;
            height: 70vh;
            display: flex;
            gap: 5px;

        }

          .items{
            height: 30px;
            width: 50px;
            border: 2px solid black;
            background-color: deepskyblue;
            flex-grow: 1;
            /* margin: 5px; */
            
        }


 .kohli{
            order: 5;
           
        }
        .dhoni{
            order: 1;
            flex-shrink: 2;
            /* ability to shrink 2 hai so half tak ho jayega */
        }
        .messi{
            order: 2;
            flex-grow: 3;
            /* by default zero hoti hai dusronlki so pehle sabki one karna imp hai  */
             align-self: flex-end;
             /* specific item ke liye hota hai  */
        }
        /* jiska order jyada hoga woh sabse last jayega  */

    </style>
</head>
<body>

    <main>
        <div class="container">
          
          
            <div class="items"></div>
            <div class="items"></div>
            <div class="items messi">messi</div>
            <div class="items ronaldo">ronaldo</div>
            <div class="items dhoni">dhoni</div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items rohit">rohit</div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items kohli">kohli</div>
            <div class="items"></div>
            <div class="items"></div>
         
        </div>
    </main>
    
    
</body>
</html>
