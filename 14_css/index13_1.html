<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS positioning</title>
    <style>
        .box{
            border: 2px solid black;
            width: 70vw;
            height: 20vh;
            margin: 10px auto;
            border-radius: 23px;
            box-shadow: 5px 5px 15px rgb(100, 208, 120);
        }
        .box1{
            background-color: rgb(227, 174, 67);
             /* position: sticky;
            top: 0px; */
           
            /* jab sticky karte  hai tab parent ka absoluute posn off hoan hi chahiye */
            
            
        }
         .box2{
            background-color: rgb(48, 139, 218);
             position: sticky;
            top: 0px;
            

        }

         .box3{
            background-color: rgb(220, 96, 231);
           

        }

         .box4{
            background-color: rgb(100, 81, 241);
        }

        .parent{
         border: 3px solid black; 
         margin: 30px auto;
         width: 90vw;
         height: 1110vh;  
         /* position: absolute;  */
         
        }


    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
    </div>
    
</body>
</html>
